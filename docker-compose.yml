services:
  postgres:
    image: postgres:16-alpine
    container_name: spinach-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: spinach
      POSTGRES_PASSWORD: spinach_dev_password
      POSTGRES_DB: spinach
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U spinach -d spinach']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
